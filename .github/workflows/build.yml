# ShaderLab build workflow.
#
# Triggers:
#   - Automatically on every push to any branch.
#   - Automatically on every pull request (open, synchronize, reopen).
#   - Manually from GitHub Actions → "Run workflow".
#
# Prerequisites (repository secrets):
#   - UNITY_LICENSE  : Contents of your Unity .ulf license file.
#   - UNITY_EMAIL    : Email address associated with your Unity account.
#   - UNITY_PASSWORD : Password for your Unity account.
#
# Build output:
#   Each target platform produces a separate artifact named
#   "ShaderLib-<Platform>" containing the AssetBundles for that platform.
#   Shader source files are uploaded as "ShaderLib-Sources".
#
# Artifact layout (after downloading all artifacts):
#   ShaderLib-StandaloneWindows64/   *.assetbundle
#   ShaderLib-StandaloneLinux64/     *.assetbundle
#   ShaderLib-Android/               *.assetbundle
#   ShaderLib-iOS/                   *.assetbundle
#   ShaderLib-WebGL/                 *.assetbundle
#   ShaderLib-Sources/               *.shader  CGInclude/

name: Build ShaderLab

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    environment: actions # 这里的名称必须和你配置 Environment secrets 时的环境名称完全一致

    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - Android
          - iOS
          - WebGL

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          targetPlatform: ${{ matrix.targetPlatform }}
          buildMethod: ShaderBuildScript.Build
          allowDirtyBuild: true
          # Pin the exact Unity version used by RimWorld so the AssetBundle header
          # matches and LoadFromFile does not return null at runtime.
          unityVersion: 2022.3.35f1

      - name: Fix build directory permissions
        run: sudo chown -R "$(id -u):$(id -g)" build/

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShaderLib-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}/
          if-no-files-found: error

  upload-sources:
    name: Upload shader sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShaderLib-Sources
          path: Assets/Shaders/
          if-no-files-found: error
