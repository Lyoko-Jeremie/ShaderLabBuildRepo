# ShaderLab build workflow.
#
# Triggers:
#   - Automatically on every push to the main branch.
#   - Manually from GitHub Actions → "Run workflow".
#
# Prerequisites (repository secrets):
#   - UNITY_LICENSE  : Contents of your Unity .ulf license file.
#   - UNITY_EMAIL    : Email address associated with your Unity account.
#   - UNITY_PASSWORD : Password for your Unity account.
#
# Build output is uploaded as a GitHub Actions artifact named "ShaderLib-AssetBundle".

name: Build ShaderLab

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build ShaderLab project
    runs-on: ubuntu-latest
    environment: actions # 这里的名称必须和你配置 Environment secrets 时的环境名称完全一致

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          targetPlatform: StandaloneWindows64
          buildMethod: ShaderBuildScript.Build
          allowDirtyBuild: true

      - name: Copy shader sources into build directory
        run: |
          sudo chown -R "$(id -u):$(id -g)" build/
          mkdir -p build && cp -r Assets/Shaders/. build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ShaderLib-AssetBundle
          path: build/
          if-no-files-found: error
